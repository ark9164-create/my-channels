<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Channels" />
  <link rel="manifest" href="manifest.json" />
  <title>My Channels</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0d;
      --surface: #13131a;
      --surface2: #1a1a23;
      --surface3: #21212d;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f5;
      --muted: #7a7a8c;
      --radius: 14px;
    }

    html { background: var(--bg); }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      padding-top: calc(14px + env(safe-area-inset-top));
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f03;
      box-shadow: 0 0 6px #f03;
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .top-bar h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }

    /* ── PLAYER ── */
    .player-wrap {
      position: relative;
      background: #000;
      aspect-ratio: 16/9;
      overflow: hidden;
    }

    .player-wrap iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    .player-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      background: #050508;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    .player-placeholder .big-icon { font-size: 40px; margin-bottom: 4px; }

    /* embed error overlay */
    .embed-error {
      display: none;
      position: absolute; inset: 0;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      background: rgba(0,0,0,0.92);
      text-align: center;
      padding: 24px;
    }
    .embed-error.show { display: flex; }
    .embed-error p { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 260px; }
    .embed-error strong { color: var(--text); font-size: 15px; display: block; margin-bottom: 4px; }

    .open-tab-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    /* ── NOW PLAYING BAR ── */
    .now-playing {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
    }

    .np-color {
      width: 4px; height: 36px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .np-info { flex: 1; min-width: 0; }
    .np-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .np-sources { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

    .src-pill {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .src-pill.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .src-pill:active { opacity: 0.7; }

    /* ── CHANNEL GRID ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 16px 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 12px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }

    @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 680px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .card:active { transform: scale(0.96); }

    .card.active {
      border-color: var(--accent, #fff);
      box-shadow: 0 0 0 1px var(--accent, #fff);
    }

    .card-accent { height: 3px; }

    .card-inner {
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-icon {
      width: 38px; height: 38px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-text { min-width: 0; }
    .card-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .card-live {
      margin-left: auto;
      flex-shrink: 0;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f03;
      opacity: 0;
      box-shadow: 0 0 4px #f03;
    }

    .card.active .card-live { opacity: 1; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 8px 12px 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-user-select: none; user-select: none;
    }
    .filter-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .filter-pill:active { opacity: 0.7; }

    .card.hidden { display: none; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="live-dot"></div>
  <h1>My Channels</h1>
</div>

<!-- PLAYER -->
<div class="player-wrap" id="player-wrap">
  <div class="player-placeholder" id="placeholder">
    <div class="big-icon">📺</div>
    <div>Tap a channel to watch</div>
  </div>
  <iframe id="player-frame" src="" allowfullscreen allow="autoplay; fullscreen" style="display:none"></iframe>
  <div class="embed-error" id="embed-error">
    <strong>Stream blocked in embed</strong>
    <p>This source can't be embedded. Open it in a new tab instead.</p>
    <a id="fallback-link" href="#" target="_blank" rel="noopener" class="open-tab-btn">Open in New Tab</a>
  </div>
</div>

<!-- NOW PLAYING -->
<div class="now-playing" id="now-playing">

  <div class="np-sources" id="np-sources"></div>

<div class="filter-bar" id="filter-bar"></div>
<div class="grid" id="grid"></div>

      ]},

  let activeChannel = null;
  let activeSourceIdx = 0;

  const frame       = document.getElementById('player-frame');
  const placeholder = document.getElementById('placeholder');
  const embedError  = document.getElementById('embed-error');
  const fallbackLink= document.getElementById('fallback-link');
  const npName      = document.getElementById('np-name');
  const npSub       = document.getElementById('np-sub');
  const npColor     = document.getElementById('np-color');
  const npSources   = document.getElementById('np-sources');

  function loadSource(ch, srcIdx) {
    activeChannel  = ch;
    activeSourceIdx = srcIdx;
    const src = ch.sources[srcIdx];

    // update now-playing bar
    npName.textContent  = ch.name;
    npSub.textContent   = ch.sub + (src.label ? ' · ' + src.label : '');
    npColor.style.background = ch.color;
    document.documentElement.style.setProperty('--accent', ch.color);

    // source pills
    npSources.innerHTML = '';
    ch.sources.forEach((s, i) => {
      const pill = document.createElement('button');
      pill.className = 'src-pill' + (i === srcIdx ? ' active' : '');
      pill.textContent = s.label;
      pill.addEventListener('click', () => loadSource(ch, i));
      npSources.appendChild(pill);
    });

    embedError.classList.remove('show');

    if (src.embedUrl) {
      placeholder.style.display = 'none';
      frame.style.display = 'block';
      frame.src = src.embedUrl;
      fallbackLink.href = src.tabUrl;

      // detect if embed was blocked (X-Frame-Options / CSP) after a delay
      const checkTimer = setTimeout(() => {
        try {
          // If we can access contentDocument it loaded; if null/throws → blocked
          if (!frame.contentDocument && !frame.contentWindow?.document) {
            showEmbedError(src.tabUrl);
          }
        } catch(e) {
          // cross-origin means it loaded (we just can't read it) — that's fine
        }
      }, 4000);

      frame.onload = () => clearTimeout(checkTimer);
    } else {
      // No embed — open in tab, show error state with link
      placeholder.style.display = 'none';
      frame.style.display = 'none';
      frame.src = '';
      showEmbedError(src.tabUrl);
    }
  }

  function showEmbedError(tabUrl) {
    fallbackLink.href = tabUrl;
    embedError.classList.add('show');
  }

  // Build filter bar
  const filterBar = document.getElementById('filter-bar');
  const cats = ['All', ...new Set(channels.map(c => c.cat))];
  let activeFilter = 'All';

    const pill = document.createElement('button');
    pill.className = 'filter-pill' + (cat === 'All' ? ' active' : '');
    pill.textContent = cat;
    pill.addEventListener('click', () => {
      activeFilter = cat;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('hidden', cat !== 'All' && c.dataset.cat !== cat);
      });
    });
    filterBar.appendChild(pill);
  });

  // Build grid
  const grid = document.getElementById('grid');

  channels.forEach((ch, chIdx) => {

    card.id = 'card-' + chIdx;
    card.dataset.cat = ch.cat;
    card.innerHTML = `

        <div class="card-icon" style="background:${ch.color}22; color:${ch.color}">${ch.icon}</div>

          <div class="card-sub">${ch.sub}</div>

    `;

      card.style.setProperty('--accent', ch.color);
      loadSource(ch, 0);
      document.querySelector('.player-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    grid.appendChild(card);
  });

  // PWA
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
